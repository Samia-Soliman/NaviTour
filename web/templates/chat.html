<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaviTour Assistant</title>
<style>
  :root{
    --bg:#08111f;
    --panel:#0f1b2d;
    --panel-2:#13233a;
    --panel-3:#1a2f4d;
    --border:rgba(148,163,184,.18);
    --border-strong:rgba(125,211,252,.26);
    --text:#e5eefb;
    --muted:#95a8c7;
    --accent:#67e8f9;
    --accent-2:#38bdf8;
    --accent-warm:#fbbf24;
    --good:#34d399;
    --danger:#fb7185;
    --user:#1d4ed8;
    --user-2:#2563eb;
    --shadow:0 28px 60px rgba(2,6,23,.36);
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{
    height:100%;
    background:
      radial-gradient(circle at top right, rgba(56,189,248,.12), transparent 28%),
      radial-gradient(circle at bottom left, rgba(251,191,36,.08), transparent 22%),
      linear-gradient(180deg,#08111f 0%,#0b1525 100%);
    color:var(--text);
    font-family:"IBM Plex Sans Arabic","Noto Sans Arabic","Segoe UI",sans-serif;
  }

  body{
    min-height:100vh;
    padding:18px;
  }

  body.embedded{
    padding:0;
    background:
      radial-gradient(circle at top right, rgba(56,189,248,.10), transparent 28%),
      linear-gradient(180deg,#08111f 0%,#0b1525 100%);
  }

  .shell{
    width:min(100%, 420px);
    height:min(760px, calc(100vh - 36px));
    margin-inline-start:auto;
    display:flex;
    flex-direction:column;
    background:linear-gradient(180deg, rgba(15,27,45,.98), rgba(10,19,33,.98));
    border:1px solid var(--border);
    border-radius:24px;
    overflow:hidden;
    box-shadow:var(--shadow);
    backdrop-filter:blur(18px);
  }

  body.embedded .shell{
    width:100%;
    height:100vh;
    margin:0;
    border:none;
    border-radius:0;
    box-shadow:none;
  }

  .shell.hidden{display:none}

  .assistant-fab{
    position:fixed;
    right:22px;
    bottom:22px;
    width:64px;
    height:64px;
    border:none;
    border-radius:22px;
    background:linear-gradient(135deg,#0ea5e9,#2563eb);
    color:white;
    font-size:28px;
    cursor:pointer;
    box-shadow:0 18px 40px rgba(37,99,235,.34);
    transition:transform .18s ease, box-shadow .18s ease, border-radius .18s ease;
    z-index:30;
  }

  .assistant-fab:hover{
    transform:translateY(-2px) scale(1.03);
    box-shadow:0 24px 50px rgba(37,99,235,.42);
  }

  .assistant-fab.open{
    border-radius:18px;
    background:linear-gradient(135deg,#ef4444,#dc2626);
  }

  body.embedded .assistant-fab{display:none}

  .topbar{
    padding:16px 18px 14px;
    background:
      linear-gradient(135deg, rgba(56,189,248,.15), rgba(30,41,59,.96) 50%, rgba(251,191,36,.08));
    border-bottom:1px solid var(--border);
  }

  .topbar-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
  }

  .brand{
    display:flex;
    align-items:flex-start;
    gap:12px;
    min-width:0;
  }

  .brand-mark{
    width:42px;
    height:42px;
    border-radius:14px;
    background:linear-gradient(135deg,rgba(103,232,249,.18),rgba(14,165,233,.20));
    border:1px solid rgba(125,211,252,.24);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    flex:0 0 auto;
  }

  .brand h1{
    font-size:15px;
    line-height:1.25;
    font-weight:800;
    color:#f8fbff;
  }

  .brand p{
    margin-top:4px;
    font-size:11px;
    line-height:1.6;
    color:var(--muted);
  }

  .close-btn{
    width:34px;
    height:34px;
    border:none;
    border-radius:12px;
    background:rgba(148,163,184,.10);
    color:var(--muted);
    cursor:pointer;
    font-size:18px;
    flex:0 0 auto;
  }

  .close-btn:hover{color:white;background:rgba(148,163,184,.16)}
  body.embedded .close-btn{display:none}

  .status-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:14px;
  }

  .pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:8px 10px;
    border-radius:999px;
    border:1px solid var(--border);
    background:rgba(15,23,42,.44);
    color:var(--muted);
    font-size:11px;
    font-weight:700;
  }

  .pill strong{color:var(--text);font-weight:800}
  .pill.live{border-color:rgba(52,211,153,.28);color:#bbf7d0}
  .pill.route{border-color:rgba(251,191,36,.28);color:#fde68a}
  .pill.offline{border-color:rgba(251,113,133,.28);color:#fecdd3}

  .chat-body{
    flex:1;
    min-height:0;
    display:flex;
    flex-direction:column;
  }

  .welcome-panel{
    padding:14px 18px 12px;
    border-bottom:1px solid rgba(148,163,184,.10);
    background:linear-gradient(180deg, rgba(19,35,58,.55), rgba(19,35,58,.18));
  }

  .welcome-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:8px;
  }

  .quick-btn{
    border:1px solid rgba(125,211,252,.18);
    background:rgba(15,27,45,.78);
    color:var(--text);
    padding:10px 11px;
    border-radius:14px;
    cursor:pointer;
    text-align:right;
    font-size:11px;
    line-height:1.5;
    transition:border-color .18s ease, transform .18s ease, background .18s ease;
  }

  .quick-btn:hover{
    border-color:rgba(103,232,249,.32);
    background:rgba(26,47,77,.82);
    transform:translateY(-1px);
  }

  #chat-area{
    flex:1;
    min-height:0;
    overflow-y:auto;
    padding:16px 16px 18px;
    display:flex;
    flex-direction:column;
    gap:12px;
    scroll-behavior:smooth;
  }

  .message-row{
    display:flex;
    gap:10px;
    align-items:flex-end;
    max-width:100%;
  }

  .message-row.user{
    justify-content:flex-start;
    flex-direction:row-reverse;
  }

  .avatar{
    width:30px;
    height:30px;
    border-radius:12px;
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    border:1px solid rgba(148,163,184,.16);
    background:rgba(15,23,42,.56);
  }

  .message-row.bot .avatar{
    background:linear-gradient(135deg,rgba(103,232,249,.18),rgba(14,165,233,.14));
    border-color:rgba(125,211,252,.18);
  }

  .message-row.user .avatar{
    background:linear-gradient(135deg,rgba(37,99,235,.24),rgba(29,78,216,.18));
    border-color:rgba(96,165,250,.18);
  }

  .bubble-wrap{
    max-width:min(88%, 310px);
    display:flex;
    flex-direction:column;
    gap:4px;
  }

  .bubble{
    border-radius:18px;
    padding:12px 14px;
    font-size:13px;
    line-height:1.8;
    white-space:pre-wrap;
    word-break:break-word;
    border:1px solid var(--border);
    box-shadow:0 8px 22px rgba(2,6,23,.16);
  }

  .message-row.bot .bubble{
    background:linear-gradient(180deg, rgba(19,35,58,.96), rgba(15,27,45,.96));
    color:var(--text);
    border-top-right-radius:8px;
  }

  .message-row.user .bubble{
    background:linear-gradient(135deg,var(--user),var(--user-2));
    color:white;
    border-color:rgba(96,165,250,.22);
    border-top-left-radius:8px;
  }

  .meta{
    font-size:10px;
    color:var(--muted);
    padding-inline:4px;
  }

  .message-row.user .meta{text-align:left}
  .message-row.bot .meta{text-align:right}

  .typing{
    display:inline-flex;
    align-items:center;
    gap:5px;
    min-width:52px;
  }

  .typing span{
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--accent);
    opacity:.35;
    animation:blink 1.2s infinite ease-in-out;
  }

  .typing span:nth-child(2){animation-delay:.15s}
  .typing span:nth-child(3){animation-delay:.3s}

  @keyframes blink{
    0%, 80%, 100%{transform:translateY(0);opacity:.25}
    40%{transform:translateY(-4px);opacity:1}
  }

  .composer{
    border-top:1px solid var(--border);
    padding:14px 16px 16px;
    background:linear-gradient(180deg, rgba(15,27,45,.72), rgba(8,17,31,.98));
  }

  .composer-actions{
    display:flex;
    gap:8px;
    margin-bottom:10px;
    flex-wrap:wrap;
  }

  .ghost-btn{
    border:1px solid var(--border);
    background:rgba(148,163,184,.08);
    color:var(--text);
    padding:8px 11px;
    border-radius:12px;
    cursor:pointer;
    font-size:11px;
    font-weight:700;
  }

  .ghost-btn:hover{background:rgba(148,163,184,.13)}

  .composer-row{
    display:flex;
    gap:10px;
    align-items:flex-end;
  }

  #msg-input{
    flex:1;
    min-height:48px;
    max-height:140px;
    resize:none;
    border-radius:16px;
    border:1px solid var(--border);
    background:rgba(8,17,31,.85);
    color:var(--text);
    padding:12px 14px;
    font:inherit;
    line-height:1.7;
    outline:none;
  }

  #msg-input:focus{
    border-color:var(--border-strong);
    box-shadow:0 0 0 4px rgba(56,189,248,.10);
  }

  .send-btn{
    min-width:106px;
    height:48px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#67e8f9,#0ea5e9);
    color:#052033;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 14px 28px rgba(14,165,233,.22);
  }

  .send-btn:disabled{
    opacity:.55;
    cursor:not-allowed;
    box-shadow:none;
  }

  .composer-note{
    margin-top:10px;
    font-size:10px;
    color:var(--muted);
    line-height:1.7;
  }

  .route-flag{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-top:6px;
    padding:7px 10px;
    border-radius:999px;
    background:rgba(251,191,36,.12);
    border:1px solid rgba(251,191,36,.22);
    color:#fde68a;
    font-size:10px;
    font-weight:700;
  }

  @media (max-width: 640px){
    body{padding:0}
    .shell{
      width:100%;
      height:100vh;
      border:none;
      border-radius:0;
    }
    .assistant-fab{
      right:16px;
      bottom:16px;
      width:60px;
      height:60px;
    }
    .welcome-grid{grid-template-columns:1fr}
    .bubble-wrap{max-width:92%}
    .send-btn{min-width:88px}
  }
</style>
</head>
<body>

<button id="chat-toggle-btn" class="assistant-fab" title="فتح مساعد NaviTour">💬</button>

<main id="chat-shell" class="shell hidden">
  <header class="topbar">
    <div class="topbar-row">
      <div class="brand">
        <div class="brand-mark">🚇</div>
        <div>
          <h1>مساعد NaviTour</h1>
          <p>مساعد مواصلات للقاهرة يفهم العربي، يعتمد على موقعك لو متاح، ويقدر يرسل الطريق مباشرة للخريطة.</p>
        </div>
      </div>
      <button id="chat-close-btn" class="close-btn" title="إغلاق">✕</button>
    </div>
    <div class="status-row">
      <div class="pill" id="api-pill">🧠 <strong>جاهز</strong></div>
      <div class="pill" id="gps-pill">📍 <strong>جارٍ فحص الموقع</strong></div>
      <div class="pill" id="route-pill">🗺 <strong>لا يوجد طريق بعد</strong></div>
    </div>
  </header>

  <section class="chat-body">
    <div class="welcome-panel" id="welcome-panel">
      <div class="welcome-grid">
        <button class="quick-btn" data-prompt="عايز أروح رمسيس من العباسية">
          اكتبلي طريق كامل
          من العباسية إلى رمسيس
        </button>
        <button class="quick-btn" data-prompt="أنا في التحرير وعايز أروح مدينة نصر">
          استخدم موقعي أو نقطة قريبة
          وروّحني مدينة نصر
        </button>
        <button class="quick-btn" data-prompt="إيه أقرب محطة مترو ليا؟">
          اعرف أقرب محطة
          باستخدام الـ GPS
        </button>
        <button class="quick-btn" data-prompt="أروح إزاي من شبرا للخليفة دلوقتي؟">
          طريق بالعربي
          مع الوقت والتحويلات
        </button>
      </div>
    </div>

    <div id="chat-area"></div>
  </section>

  <footer class="composer">
    <div class="composer-actions">
      <button id="reset-btn" class="ghost-btn">↺ محادثة جديدة</button>
      <button id="location-btn" class="ghost-btn">📍 تحديث موقعي</button>
    </div>
    <div class="composer-row">
      <textarea id="msg-input" rows="1" placeholder="اكتب سؤالك هنا… مثل: عايز أروح رمسيس من العباسية"></textarea>
      <button id="send-btn" class="send-btn">إرسال</button>
    </div>
    <div class="composer-note">
      لو المساعد لقى طريق، هيبعت الاختيارات للخريطة تلقائياً علشان تختار المسار المناسب.
    </div>
  </footer>
</main>

<script>
const API = (() => {
  const origin = window.location.origin;
  if (origin && origin !== 'null' && /^https?:/i.test(origin)) {
    return origin.includes(':8000') ? origin : 'http://127.0.0.1:8000';
  }
  return 'http://127.0.0.1:8000';
})();

const CHAT_SESSION_KEY = 'navitour_chat_session_id';
const EMBEDDED = window.parent && window.parent !== window;

const shell = document.getElementById('chat-shell');
const chatArea = document.getElementById('chat-area');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const resetBtn = document.getElementById('reset-btn');
const locationBtn = document.getElementById('location-btn');
const toggleBtn = document.getElementById('chat-toggle-btn');
const closeBtn = document.getElementById('chat-close-btn');
const gpsPill = document.getElementById('gps-pill');
const apiPill = document.getElementById('api-pill');
const routePill = document.getElementById('route-pill');
const welcomePanel = document.getElementById('welcome-panel');

let initialized = false;
let pendingTypingNode = null;
let lastRoutePayload = null;

if (EMBEDDED) {
  document.body.classList.add('embedded');
  shell.classList.remove('hidden');
}

function ensureSessionId() {
  let sessionId = sessionStorage.getItem(CHAT_SESSION_KEY);
  if (!sessionId) {
    sessionId = window.crypto && window.crypto.randomUUID
      ? window.crypto.randomUUID()
      : 'session-' + Math.random().toString(36).slice(2);
    sessionStorage.setItem(CHAT_SESSION_KEY, sessionId);
  }
  return sessionId;
}

function updateSessionId(sessionId) {
  if (sessionId) sessionStorage.setItem(CHAT_SESSION_KEY, sessionId);
}

function setPill(el, text, mode = 'default') {
  el.className = 'pill' + (mode === 'live' ? ' live' : mode === 'route' ? ' route' : mode === 'offline' ? ' offline' : '');
  el.innerHTML = text;
}

function setComposerDisabled(disabled) {
  sendBtn.disabled = disabled;
  input.disabled = disabled;
  locationBtn.disabled = disabled;
}

function autoResizeTextarea() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
}

function scrollChatToBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

function formatNow() {
  return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
}

function createMessageRow(text, role, options = {}) {
  const row = document.createElement('div');
  row.className = `message-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'أنت' : 'AI';

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);

  if (options.routeFlagText) {
    const routeFlag = document.createElement('div');
    routeFlag.className = 'route-flag';
    routeFlag.textContent = options.routeFlagText;
    wrap.appendChild(routeFlag);
  }

  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = options.meta || formatNow();
  wrap.appendChild(meta);

  row.appendChild(avatar);
  row.appendChild(wrap);
  return row;
}

function addMsg(text, role, options = {}) {
  if (welcomePanel && chatArea.children.length === 0 && text) {
    welcomePanel.style.display = 'none';
  }
  const node = createMessageRow(text, role, options);
  chatArea.appendChild(node);
  scrollChatToBottom();
  return node;
}

function showTyping() {
  hideTyping();
  const row = document.createElement('div');
  row.className = 'message-row bot';
  row.innerHTML = `
    <div class="avatar">AI</div>
    <div class="bubble-wrap">
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
      <div class="meta">جاري تجهيز الرد…</div>
    </div>
  `;
  chatArea.appendChild(row);
  pendingTypingNode = row;
  scrollChatToBottom();
}

function hideTyping() {
  if (pendingTypingNode && pendingTypingNode.parentNode) {
    pendingTypingNode.parentNode.removeChild(pendingTypingNode);
  }
  pendingTypingNode = null;
}

function publishRouteToParent(routePayload, liveLocation) {
  if (!routePayload || !window.parent || window.parent === window) return;

  const targetOrigin = (window.location.origin && window.location.origin !== 'null')
    ? window.location.origin
    : '*';

  window.parent.postMessage({
    type: 'navitour:route-found',
    route: routePayload,
    liveLocation: liveLocation || null
  }, targetOrigin);
}

async function syncLiveLocation(showSuccess = false) {
  if (!navigator.geolocation) {
    setPill(gpsPill, '📍 <strong>المتصفح لا يدعم الموقع</strong>', 'offline');
    return null;
  }

  setPill(gpsPill, '📍 <strong>جارٍ تحديث الموقع…</strong>');

  try {
    const position = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true,
        timeout: 6000,
        maximumAge: 30000
      });
    });

    const payload = {
      session_id: ensureSessionId(),
      lat: position.coords.latitude,
      lon: position.coords.longitude,
      accuracy: position.coords.accuracy
    };

    const response = await fetch(`${API}/api/location`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });

    if (!response.ok) throw new Error('Location sync failed');

    const accuracy = Math.round(position.coords.accuracy || 0);
    setPill(
      gpsPill,
      `📍 <strong>${showSuccess ? 'تم تحديث الموقع' : 'الموقع متاح'}</strong>${accuracy ? ` • ±${accuracy}م` : ''}`,
      'live'
    );
    return payload;
  } catch (_) {
    setPill(gpsPill, '📍 <strong>الموقع غير متاح حالياً</strong>', 'offline');
    return null;
  }
}

async function sendMessage(prefilledText = null) {
  const text = (prefilledText ?? input.value).trim();
  if (!text) return;

  addMsg(text, 'user');
  input.value = '';
  autoResizeTextarea();
  setComposerDisabled(true);
  showTyping();

  await syncLiveLocation(false);

  try {
    const response = await fetch(`${API}/message`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message: text, session_id: ensureSessionId()})
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.detail || 'Request failed');

    updateSessionId(data.session_id);
    hideTyping();

    const routeOptionsCount = Array.isArray(data.route?.route_options) ? data.route.route_options.length : 0;
    if (data.route) {
      lastRoutePayload = data.route;
      publishRouteToParent(data.route, data.live_location);
      setPill(routePill, `🗺 <strong>تم العثور على طريق</strong>${routeOptionsCount ? ` • ${routeOptionsCount} اختيار` : ''}`, 'route');
    } else {
      setPill(routePill, '🗺 <strong>لا يوجد طريق في آخر رد</strong>');
    }

    addMsg(data.reply, 'bot', {
      routeFlagText: data.route ? (routeOptionsCount > 1 ? `تم إرسال ${routeOptionsCount} مسارات للخريطة` : 'تم إرسال الطريق للخريطة') : null
    });
    setPill(apiPill, '🧠 <strong>الخادم متصل</strong>');
  } catch (error) {
    hideTyping();
    addMsg('حصلت مشكلة في الاتصال بالخادم. تأكد إن الـ API شغال على المنفذ 8000.', 'bot');
    setPill(apiPill, '🧠 <strong>الخادم غير متاح</strong>', 'offline');
  } finally {
    setComposerDisabled(false);
    input.focus();
  }
}

async function resetChat() {
  try {
    const response = await fetch(`${API}/reset`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({session_id: ensureSessionId()})
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.detail || 'Reset failed');

    updateSessionId(data.session_id);
    chatArea.innerHTML = '';
    welcomePanel.style.display = '';
    lastRoutePayload = null;
    setPill(routePill, '🗺 <strong>لا يوجد طريق بعد</strong>');
    await startChat(true);
  } catch (_) {
    addMsg('تعذر بدء محادثة جديدة حالياً.', 'bot');
  }
}

async function startChat(force = false) {
  if (initialized && !force) return;
  initialized = true;

  await syncLiveLocation(false);
  showTyping();

  try {
    const response = await fetch(`${API}/message`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message:'', session_id: ensureSessionId()})
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.detail || 'Chat unavailable');

    updateSessionId(data.session_id);
    hideTyping();
    addMsg(data.reply, 'bot');
    setPill(apiPill, '🧠 <strong>الخادم متصل</strong>');
  } catch (_) {
    hideTyping();
    addMsg('لم أتمكن من الوصول إلى الخادم الآن. شغّل الـ API ثم جرّب مرة ثانية.', 'bot');
    setPill(apiPill, '🧠 <strong>الخادم غير متاح</strong>', 'offline');
  }
}

function openChat() {
  shell.classList.remove('hidden');
  toggleBtn.classList.add('open');
  toggleBtn.textContent = '✕';
  input.focus();
  startChat();
}

function closeChat() {
  if (EMBEDDED) return;
  shell.classList.add('hidden');
  toggleBtn.classList.remove('open');
  toggleBtn.textContent = '💬';
}

toggleBtn.addEventListener('click', () => {
  if (shell.classList.contains('hidden')) openChat();
  else closeChat();
});

closeBtn.addEventListener('click', closeChat);
sendBtn.addEventListener('click', () => sendMessage());
resetBtn.addEventListener('click', resetChat);
locationBtn.addEventListener('click', async () => { await syncLiveLocation(true); });

input.addEventListener('input', autoResizeTextarea);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => sendMessage(btn.dataset.prompt || ''));
});

document.addEventListener('click', (e) => {
  if (EMBEDDED || shell.classList.contains('hidden')) return;
  if (shell.contains(e.target) || e.target === toggleBtn) return;
  closeChat();
});

if (EMBEDDED) {
  startChat();
}
</script>
</body>
</html>
